<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💰 Expense Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <!-- Chart.js CDN for the pie chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header>
            <h1>💰 Expense Tracker</h1>
            <p>Track your spending. Stay in control.</p>
        </header>

        <!-- Summary Cards -->
        <div class="summary">
            <div class="summary-card">
                <span class="summary-label">Total Expenses</span>
                <span class="summary-value" id="total-expenses">$0.00</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">Highest Category</span>
                <span class="summary-value" id="highest-category">—</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">Total Entries</span>
                <span class="summary-value" id="total-entries">0</span>
            </div>
        </div>

        <!-- Add Expense Form -->
        <div class="form-container">
            <h2>Add Expense</h2>
            <form id="expense-form">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="e.g., Groceries" required />
                </div>
                <div class="form-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required />
                </div>
                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" required>
                        <option value="">Select a category</option>
                        <option value="Food">🍔 Food</option>
                        <option value="Transport">🚗 Transport</option>
                        <option value="Entertainment">🎬 Entertainment</option>
                        <option value="Shopping">🛍️ Shopping</option>
                        <option value="Bills">📄 Bills</option>
                        <option value="Health">💊 Health</option>
                        <option value="Education">📚 Education</option>
                        <option value="Other">📦 Other</option>
                    </select>
                </div>
                <button type="submit" class="btn-add">+ Add Expense</button>
            </form>
        </div>

        <!-- Chart & Expenses Grid -->
        <div class="dashboard">
            <!-- Pie Chart -->
            <div class="chart-container">
                <h2>Spending Breakdown</h2>
                <canvas id="expense-chart"></canvas>
            </div>

            <!-- Expense List -->
            <div class="expenses-container">
                <div class="expenses-header">
                    <h2>Recent Expenses</h2>
                    <button id="clear-all-btn" class="btn-clear">Clear All</button>
                </div>
                <div id="expense-list">
                    <p class="empty-message">No expenses yet. Add one above!</p>
                </div>
            </div>
        </div>

        <footer>
            <p>💾 All data is saved locally in your browser.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
